<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Avançado de Controle de Clientes</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 20px;
    min-height: 100vh;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 2.5em;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    transition: transform 0.3s;
}

.stat-card:hover {
    transform: translateY(-5px);
}

.stat-card h3 {
    font-size: 0.9em;
    opacity: 0.9;
    margin-bottom: 10px;
}

.stat-card .number {
    font-size: 2em;
    font-weight: bold;
}

.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 15px;
    margin-bottom: 25px;
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.9);
    font-size: 14px;
}

textarea {
    resize: vertical;
    min-height: 80px;
}

button {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: all 0.3s;
}

.btn-primary {
    background: #00b894;
    color: white;
}

.btn-primary:hover {
    background: #00a884;
    transform: translateY(-2px);
}

.btn-danger {
    background: #ff4757;
    color: white;
}

.btn-danger:hover {
    background: #ff3838;
}

.btn-warning {
    background: #ffa502;
    color: white;
}

.btn-info {
    background: #1e90ff;
    color: white;
}

.btn-sm {
    padding: 5px 10px;
    font-size: 12px;
    margin: 2px;
}

.clientes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 20px;
}

.cliente-card {
    background: rgba(255,255,255,0.95);
    color: #333;
    padding: 20px;
    border-radius: 15px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
}

.cliente-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.cliente-card.vencido {
    border-left: 5px solid #ff4757;
    background: #fff5f5;
}

.cliente-card.hoje {
    border-left: 5px solid #ffa502;
    background: #fffef5;
}

.cliente-card h3 {
    margin-bottom: 10px;
    color: #667eea;
}

.cliente-card p {
    margin: 8px 0;
    font-size: 14px;
}

.badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: bold;
    margin-left: 10px;
}

.badge-mensal {
    background: #3498db;
    color: white;
}

.badge-vitalicio {
    background: #e74c3c;
    color: white;
}

.status {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
}

.status-pago {
    background: #00b894;
}

.status-pendente {
    background: #ff4757;
}

.acoes {
    margin-top: 15px;
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
}

.filtros {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.filtro-btn {
    background: rgba(255,255,255,0.2);
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s;
}

.filtro-btn.active {
    background: #00b894;
}

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    color: #333;
    padding: 30px;
    border-radius: 15px;
    max-width: 500px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
}

@media (max-width: 768px) {
    .clientes-grid {
        grid-template-columns: 1fr;
    }
    
    .dashboard {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>📊 Sistema Avançado de Controle de Clientes</h1>

    <div class="dashboard">
        <div class="stat-card">
            <h3>Total de Clientes</h3>
            <div class="number" id="totalClientes">0</div>
        </div>
        <div class="stat-card">
            <h3>Vencendo Hoje</h3>
            <div class="number" id="vencendoHoje">0</div>
        </div>
        <div class="stat-card">
            <h3>Vencidos</h3>
            <div class="number" id="vencidos">0</div>
        </div>
        <div class="stat-card">
            <h3>Receita Mensal</h3>
            <div class="number" id="receitaMensal">R$ 0</div>
        </div>
    </div>

    <div class="card">
        <h2>➕ Novo Cliente</h2>
        <form id="clienteForm">
            <div class="form-group">
                <label>Nome do Cliente *</label>
                <input type="text" id="nome" required placeholder="Nome completo">
            </div>

            <div class="form-group">
                <label>Telefone (com DDD) *</label>
                <input type="tel" id="telefone" required placeholder="(11) 99999-9999">
                <small>Ex: 11999999999 (apenas números)</small>
            </div>

            <div class="form-group">
                <label>Valor (R$) *</label>
                <input type="number" id="valor" step="0.01" required placeholder="0.00">
            </div>

            <div class="form-group">
                <label>Tipo de Plano *</label>
                <select id="tipoPlano">
                    <option value="mensal">📅 Mensal</option>
                    <option value="vitalicio">♾️ Vitalício</option>
                </select>
            </div>

            <div class="form-group" id="dataVencimentoGroup">
                <label>Data de Vencimento *</label>
                <input type="date" id="vencimento" required>
            </div>

            <div class="form-group">
                <label>Observações</label>
                <textarea id="observacoes" placeholder="Informações adicionais..."></textarea>
            </div>

            <button type="submit" class="btn-primary">💾 Salvar Cliente</button>
        </form>
    </div>

    <div class="filtros">
        <div class="filtro-btn active" data-filtro="todos">📋 Todos</div>
        <div class="filtro-btn" data-filtro="hoje">⚠️ Vence Hoje</div>
        <div class="filtro-btn" data-filtro="vencido">🔴 Vencidos</div>
        <div class="filtro-btn" data-filtro="mensal">📅 Mensais</div>
        <div class="filtro-btn" data-filtro="vitalicio">♾️ Vitalícios</div>
    </div>

    <div id="listaClientes" class="clientes-grid"></div>
</div>

<!-- Modal para envio de mensagem -->
<div id="modalMensagem" class="modal">
    <div class="modal-content">
        <h2>📱 Enviar Mensagem</h2>
        <div class="form-group">
            <label>Cliente:</label>
            <p id="clienteNome" style="font-weight: bold;"></p>
        </div>
        <div class="form-group">
            <label>Template de Mensagem:</label>
            <select id="templateMensagem" onchange="aplicarTemplate()">
                <option value="">Selecione um template</option>
                <option value="lembrete">Lembrete de Pagamento</option>
                <option value="atraso">Aviso de Atraso</option>
                <option value="negociacao">Proposta de Negociação</option>
            </select>
        </div>
        <div class="form-group">
            <label>Sua Mensagem:</label>
            <textarea id="mensagemTexto" rows="5" placeholder="Digite sua mensagem..."></textarea>
        </div>
        <div class="form-group">
            <button onclick="enviarWhatsApp()" class="btn-primary">📱 Enviar WhatsApp</button>
            <button onclick="enviarSMS()" class="btn-info">✉️ Enviar SMS</button>
            <button onclick="fecharModal()" class="btn-danger">❌ Cancelar</button>
        </div>
    </div>
</div>

<script>
let clientes = JSON.parse(localStorage.getItem('clientes_avancado')) || [];
let filtroAtual = 'todos';
let clienteSelecionado = null;

// Inicialização
function init() {
    renderizarClientes();
    atualizarDashboard();
    configurarEventos();
    verificarVencimentos();
    setInterval(verificarVencimentos, 60000);
    solicitarPermissaoNotificacao();
}

// Configurar eventos
function configurarEventos() {
    document.getElementById('clienteForm').addEventListener('submit', function(e) {
        e.preventDefault();
        salvarCliente();
    });

    document.getElementById('tipoPlano').addEventListener('change', function() {
        const grupoData = document.getElementById('dataVencimentoGroup');
        if (this.value === 'vitalicio') {
            grupoData.style.display = 'none';
            document.getElementById('vencimento').required = false;
        } else {
            grupoData.style.display = 'block';
            document.getElementById('vencimento').required = true;
        }
    });

    document.querySelectorAll('.filtro-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            filtroAtual = this.dataset.filtro;
            renderizarClientes();
        });
    });
}

// Salvar cliente
function salvarCliente() {
    const nome = document.getElementById('nome').value;
    const telefone = document.getElementById('telefone').value;
    const valor = parseFloat(document.getElementById('valor').value);
    const tipoPlano = document.getElementById('tipoPlano').value;
    let vencimento = document.getElementById('vencimento').value;
    const observacoes = document.getElementById('observacoes').value;

    if (!nome || !telefone || !valor) {
        alert('Por favor, preencha os campos obrigatórios!');
        return;
    }

    if (tipoPlano === 'mensal' && !vencimento) {
        alert('Para planos mensais, a data de vencimento é obrigatória!');
        return;
    }

    const novoCliente = {
        id: Date.now(),
        nome,
        telefone: formatarTelefone(telefone),
        valor,
        tipoPlano,
        vencimento: tipoPlano === 'mensal' ? vencimento : null,
        observacoes,
        status: 'pendente',
        dataCadastro: new Date().toISOString(),
        historicoPagamentos: [],
        notificadoHoje: false
    };

    clientes.push(novoCliente);
    localStorage.setItem('clientes_avancado', JSON.stringify(clientes));
    
    document.getElementById('clienteForm').reset();
    renderizarClientes();
    atualizarDashboard();
    
    alert('Cliente cadastrado com sucesso!');
}

// Renderizar clientes com filtros
function renderizarClientes() {
    const lista = document.getElementById('listaClientes');
    let clientesFiltrados = filtrarClientes();
    
    if (clientesFiltrados.length === 0) {
        lista.innerHTML = '<div class="card" style="text-align: center;">Nenhum cliente encontrado</div>';
        return;
    }

    lista.innerHTML = clientesFiltrados.map(cliente => `
        <div class="cliente-card ${getStatusClass(cliente)}">
            <div class="status ${cliente.status === 'pago' ? 'status-pago' : 'status-pendente'}"></div>
            <h3>
                ${cliente.nome}
                <span class="badge ${cliente.tipoPlano === 'mensal' ? 'badge-mensal' : 'badge-vitalicio'}">
                    ${cliente.tipoPlano === 'mensal' ? '📅 Mensal' : '♾️ Vitalício'}
                </span>
            </h3>
            <p>💰 Valor: <strong>R$ ${cliente.valor.toFixed(2)}</strong></p>
            ${cliente.tipoPlano === 'mensal' ? `<p>📆 Vencimento: ${formatarData(cliente.vencimento)}</p>` : '<p>♾️ Sem vencimento (Vitalício)</p>'}
            <p>📱 Telefone: ${cliente.telefone}</p>
            ${cliente.observacoes ? `<p>📝 Obs: ${cliente.observacoes}</p>` : ''}
            <p>📅 Cadastro: ${formatarData(cliente.dataCadastro)}</p>
            
            <div class="acoes">
                ${cliente.status === 'pendente' ? `<button class="btn-primary btn-sm" onclick="marcarPago(${cliente.id})">✅ Marcar Pago</button>` : '<button class="btn-info btn-sm" disabled>✅ Pago</button>'}
                ${cliente.tipoPlano === 'mensal' ? `<button class="btn-info btn-sm" onclick="adiarVencimento(${cliente.id})">⏰ Adiar Venc.</button>` : ''}
                <button class="btn-warning btn-sm" onclick="abrirModalMensagem(${cliente.id})">💬 Enviar Msg</button>
                <button class="btn-danger btn-sm" onclick="deletarCliente(${cliente.id})">🗑️ Excluir</button>
            </div>
        </div>
    `).join('');
}

// Filtrar clientes
function filtrarClientes() {
    const hoje = new Date().toISOString().split('T')[0];
    
    switch(filtroAtual) {
        case 'hoje':
            return clientes.filter(c => c.tipoPlano === 'mensal' && c.vencimento === hoje && c.status !== 'pago');
        case 'vencido':
            return clientes.filter(c => c.tipoPlano === 'mensal' && c.vencimento < hoje && c.status !== 'pago');
        case 'mensal':
            return clientes.filter(c => c.tipoPlano === 'mensal');
        case 'vitalicio':
            return clientes.filter(c => c.tipoPlano === 'vitalicio');
        default:
            return clientes;
    }
}

// Obter classe de status
function getStatusClass(cliente) {
    if (cliente.tipoPlano !== 'mensal') return '';
    const hoje = new Date().toISOString().split('T')[0];
    if (cliente.vencimento === hoje && cliente.status !== 'pago') return 'hoje';
    if (cliente.vencimento < hoje && cliente.status !== 'pago') return 'vencido';
    return '';
}

// Marcar como pago
function marcarPago(id) {
    const cliente = clientes.find(c => c.id === id);
    if (cliente) {
        cliente.status = 'pago';
        cliente.historicoPagamentos.push({
            data: new Date().toISOString(),
            valor: cliente.valor
        });
        
        // Para clientes mensais, gerar próximo vencimento
        if (cliente.tipoPlano === 'mensal') {
            const proximoVencimento = new Date(cliente.vencimento);
            proximoVencimento.setMonth(proximoVencimento.getMonth() + 1);
            cliente.vencimento = proximoVencimento.toISOString().split('T')[0];
            cliente.status = 'pendente';
            cliente.notificadoHoje = false;
        }
        
        localStorage.setItem('clientes_avancado', JSON.stringify(clientes));
        renderizarClientes();
        atualizarDashboard();
        alert('Pagamento registrado com sucesso!');
    }
}

// Adiar vencimento
function adiarVencimento(id) {
    const dias = prompt('Quantos dias deseja adiar?', '7');
    if (dias && !isNaN(dias)) {
        const cliente = clientes.find(c => c.id === id);
        if (cliente) {
            const novaData = new Date(cliente.vencimento);
            novaData.setDate(novaData.getDate() + parseInt(dias));
            cliente.vencimento = novaData.toISOString().split('T')[0];
            localStorage.setItem('clientes_avancado', JSON.stringify(clientes));
            renderizarClientes();
            alert(`Vencimento adiado para ${formatarData(cliente.vencimento)}`);
        }
    }
}

// Deletar cliente
function deletarCliente(id) {
    if (confirm('Tem certeza que deseja excluir este cliente?')) {
        clientes = clientes.filter(c => c.id !== id);
        localStorage.setItem('clientes_avancado', JSON.stringify(clientes));
        renderizarClientes();
        atualizarDashboard();
    }
}

// Atualizar dashboard
function atualizarDashboard() {
    const hoje = new Date().toISOString().split('T')[0];
    const total = clientes.length;
    const vencendoHoje = clientes.filter(c => c.tipoPlano === 'mensal' && c.vencimento === hoje && c.status !== 'pago').length;
    const vencidos = clientes.filter(c => c.tipoPlano === 'mensal' && c.vencimento < hoje && c.status !== 'pago').length;
    
    // Calcular receita mensal (apenas mensais)
    const receitaMensal = clientes
        .filter(c => c.tipoPlano === 'mensal' && c.status === 'pendente')
        .reduce((sum, c) => sum + c.valor, 0);
    
    document.getElementById('totalClientes').textContent = total;
    document.getElementById('vencendoHoje').textContent = vencendoHoje;
    document.getElementById('vencidos').textContent = vencidos;
    document.getElementById('receitaMensal').textContent = `R$ ${receitaMensal.toFixed(2)}`;
}

// Abrir modal de mensagem
function abrirModalMensagem(id) {
    clienteSelecionado = clientes.find(c => c.id === id);
    if (clienteSelecionado) {
        document.getElementById('clienteNome').textContent = clienteSelecionado.nome;
        document.getElementById('modalMensagem').style.display = 'flex';
        document.getElementById('mensagemTexto').value = gerarMensagemPadrao(clienteSelecionado);
    }
}

// Aplicar template
function aplicarTemplate() {
    const template = document.getElementById('templateMensagem').value;
    let mensagem = '';
    
    switch(template) {
        case 'lembrete':
            mensagem = `Olá ${clienteSelecionado.nome}! 👋\n\nEste é um lembrete amigável de que seu pagamento no valor de R$ ${clienteSelecionado.valor.toFixed(2)} vence em breve.\n\nFique atento à data de vencimento para evitar atrasos.\n\nAgradecemos pela preferência! 🙏`;
            break;
        case 'atraso':
            mensagem = `Olá ${clienteSelecionado.nome}! ⚠️\n\nIdentificamos que seu pagamento no valor de R$ ${clienteSelecionado.valor.toFixed(2)} está em atraso.\n\nPor favor, regularize sua situação o mais breve possível para evitar transtornos.\n\nEstamos à disposição para negociar! 📞`;
            break;
        case 'negociacao':
            mensagem = `Olá ${clienteSelecionado.nome}! 🤝\n\nGostaríamos de propor uma negociação especial para seu débito no valor de R$ ${clienteSelecionado.valor.toFixed(2)}.\n\nEntre em contato para conhecermos as condições especiais que preparamos para você!\n\nAguardamos seu contato! 📱`;
            break;
    }
    
    if (mensagem) {
        document.getElementById('mensagemTexto').value = mensagem;
    }
}

// Gerar mensagem padrão
function gerarMensagemPadrao(cliente) {
    return `Olá ${cliente.nome}! 👋\n\nSeu pagamento no valor de R$ ${cliente.valor.toFixed(2)} está pendente.\n\nPor favor, entre em contato para regularizar sua situação.\n\nAgradecemos pela atenção!`;
}

// Enviar WhatsApp
function enviarWhatsApp() {
    if (!clienteSelecionado) return;
    
    const telefone = clienteSelecionado.telefone.replace(/\D/g, '');
    const mensagem = encodeURIComponent(document.getElementById('mensagemTexto').value);
    const url = `https://wa.me/55${telefone}?text=${mensagem}`;
    
    window.open(url, '_blank');
    fecharModal();
}

// Enviar SMS (via link)
function enviarSMS() {
    if (!clienteSelecionado) return;
    
    const telefone = clienteSelecionado.telefone.replace(/\D/g, '');
    const mensagem = encodeURIComponent(document.getElementById('mensagemTexto').value);
    const url = `sms:${telefone}?body=${mensagem}`;
    
    window.location.href = url;
    fecharModal();
}

// Fechar modal
function fecharModal() {
    document.getElementById('modalMensagem').style.display = 'none';
    clienteSelecionado = null;
}

// Verificar vencimentos e enviar notificações
function verificarVencimentos() {
    const hoje = new Date().toISOString().split('T')[0];
    const agora = new Date();
    const hora = agora.getHours();
    const minutos = agora.getMinutes();
    
    clientes.forEach(cliente => {
        if (cliente.tipoPlano === 'mensal' && cliente.vencimento === hoje && !cliente.notificadoHoje && cliente.status !== 'pago') {
            // Notificação do sistema
            if (Notification.permission === 'granted') {
                new Notification('📢 Cliente com vencimento hoje!', {
                    body: `${cliente.nome} - R$ ${cliente.valor.toFixed(2)}`,
                    icon: 'https://cdn-icons-png.flaticon.com/512/190/190411.png'
                });
            }
            
            cliente.notificadoHoje = true;
            localStorage.setItem('clientes_avancado', JSON.stringify(clientes));
            
            // Registrar no console
            console.log(`🔔 Lembrete: ${cliente.nome} vence hoje - R$ ${cliente.valor}`);
        }
    });
    
    atualizarDashboard();
}

// Solicitar permissão de notificação
function solicitarPermissaoNotificacao() {
    if (Notification.permission !== 'granted' && Notification.permission !== 'denied') {
        Notification.requestPermission();
    }
}

// Funções auxiliares
function formatarData(data) {
    if (!data) return 'N/A';
    const d = new Date(data);
    return d.toLocaleDateString('pt-BR');
}

function formatarTelefone(telefone) {
    let numbers = telefone.replace(/\D/g, '');
    if (numbers.length === 11) {
        return numbers.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
    }
    return numbers;
}

// Inicializar sistema
init();
</script>

</body>
</html>
